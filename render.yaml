services:
  - type: web
    name: student-biodata-api
    env: node
    region: frankfurt
    buildCommand: cd server && npm ci && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: cd server && node dist/src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
